worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Rate limiting zone
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/m;

    upstream auth_service {
        server auth-service:8001;
    }
    upstream banking_service {
        server banking-service:8002;
    }
    upstream notification_service {
        server notification-service:8003;
    }
    upstream analytics_service {
        server analytics-service:8004;
    }
    upstream admin_service {
        server admin-service:8005;
    }
    upstream employee_service {
        server employee-service:8006;
    }
    upstream chatbot_service {
        server chatbot-service:8007;
    }

    server {
        listen 8000;
        server_name localhost;

        # ── CORS Headers ──
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept' always;

        # Handle OPTIONS preflight
        location @cors_preflight {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept';
            add_header 'Access-Control-Max-Age' 3600;
            add_header 'Content-Length' 0;
            return 204;
        }

        # ── Health Check ──
        location /health {
            return 200 '{"status":"healthy","service":"api-gateway"}';
            add_header Content-Type application/json;
        }

        # ── Auth Service ──
        location /api/v1/auth/ {
            limit_req zone=auth_limit burst=10 nodelay;
            if ($request_method = OPTIONS) {
                return 204;
            }
            proxy_pass http://auth_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── Banking Service ──
        location /api/v1/accounts {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://banking_service/accounts;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/v1/transactions/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://banking_service/transactions/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/v1/ledger {
            proxy_pass http://banking_service/ledger;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/v1/bills/ {
            proxy_pass http://banking_service/bills/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/v1/goals {
            proxy_pass http://banking_service/goals;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/v1/exchange-rates {
            proxy_pass http://banking_service/exchange-rates;
            proxy_set_header Host $host;
        }

        location /api/v1/customers {
            proxy_pass http://banking_service/customers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── Notification Service ──
        location /api/v1/messages {
            proxy_pass http://notification_service/messages;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/v1/notifications {
            proxy_pass http://notification_service/notifications;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # WebSocket proxy
        location /api/v1/ws/ {
            proxy_pass http://notification_service/ws/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 86400;
        }

        # ── Analytics Service ──
        location /api/v1/audit-logs {
            proxy_pass http://analytics_service/audit-logs;
            proxy_set_header Host $host;
        }

        location /api/v1/stats/ {
            proxy_pass http://analytics_service/stats/;
            proxy_set_header Host $host;
        }

        location /api/v1/spending-analysis {
            proxy_pass http://analytics_service/spending-analysis;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/v1/reports/ {
            proxy_pass http://analytics_service/reports/;
            proxy_set_header Host $host;
        }

        # ── Admin Service ──
        location /api/v1/admin/ {
            proxy_pass http://admin_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── Employee Service ──
        location /api/v1/employee/ {
            proxy_pass http://employee_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── Chatbot Service ──
        location /api/v1/chatbot/ {
            proxy_pass http://chatbot_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 60;
        }
    }
}
